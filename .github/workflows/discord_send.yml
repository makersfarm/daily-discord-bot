name: Send Discord Message
on:
  push:
    branches: ['**']
    paths: ['data/today_discord_payload.json']
  workflow_dispatch:
    inputs:
      payload:
        description: 'Discord payload JSON (object or array of objects)'
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'push' }}
      - name: POST payload(s) to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISPATCH_PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_PAYLOAD:-}" ]; then
            SRC="$DISPATCH_PAYLOAD"
          else
            SRC=$(cat data/today_discord_payload.json)
          fi
          KIND=$(printf '%s' "$SRC" | jq -r 'type')
          if [ "$KIND" = "array" ]; then
            COUNT=$(printf '%s' "$SRC" | jq 'length')
            for i in $(seq 0 $((COUNT - 1))); do
              printf '%s' "$SRC" | jq -c ".[$i]" | curl -fsS -X POST \
                -H "Content-Type: application/json" \
                --data-binary @- "$WEBHOOK"
              sleep 0.5
            done
          else
            printf '%s' "$SRC" | curl -fsS -X POST \
              -H "Content-Type: application/json" \
              --data-binary @- "$WEBHOOK"
          fi
